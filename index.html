<!DOCTYPE html>
<html>
<head>
<title>ML COUNTER PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(to bottom, #070b1f, #0f1433);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

h1 { color: orange; }

.classe-btn {
    background: linear-gradient(45deg, #ff9900, #ffb84d);
    border: none;
    padding: 12px 22px;
    border-radius: 14px;
    font-weight: bold;
    margin: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.classe-btn:hover { transform: scale(1.05); }

.hero-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
}

.hero-card {
    background: #1b1f3a;
    border-radius: 18px;
    padding: 10px;
    width: 160px;
    cursor: pointer;
    transition: 0.3s;
}

.hero-card:hover { transform: scale(1.05); }

.hero-card img {
    width: 100%;
    border-radius: 14px;
}

.hero-name {
    margin-top: 8px;
    font-weight: bold;
}

.detalhes-card {
    margin-top: 40px;
    background: rgba(27,31,58,0.95);
    padding: 25px;
    border-radius: 25px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 25px rgba(255,165,0,0.3);
}

.detalhes-card img {
    width: 60%;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255,165,0,0.4);
}

.info { text-align: left; margin-top: 15px; line-height: 1.6; }

.skill {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
    text-align: left;
}

.skill-title {
    color: #ffb84d;
    font-weight: bold;
    margin-bottom: 8px;
}

.dourado { color: #ffb84d; font-weight: bold; }
.vermelho { color: #ff4d4d; font-weight: bold; }

/* TABELA */
.tabela-skill {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
    font-size: 14px;
}

.tabela-skill th, .tabela-skill td {
    padding: 8px;
    text-align: center;
}

.tabela-skill th {
    background: rgba(255,255,255,0.08);
}

.tabela-skill tr:nth-child(even) {
    background: rgba(255,255,255,0.05);
}

.tabela-skill tr:hover {
    background: rgba(255,165,0,0.08);
}
</style>
</head>

<body>

<h1>ML COUNTER PRO</h1>
<h2>Escolha uma Classe</h2>

<button class="classe-btn" onclick="mostrarLutador()">⚔️ Lutador</button>

<div class="hero-container" id="listaHerois"></div>
<div id="detalhes"></div>

<script>

function mostrarLutador() {
    document.getElementById("listaHerois").innerHTML = `
        <div class="hero-card" onclick="abrirFreya()">
            <img src="freya-card.jpg">
            <div class="hero-name">Freya</div>
        </div>
    `;
}

function abrirFreya() {
    document.getElementById("detalhes").innerHTML = `
        <div class="detalhes-card">

            <img src="freya-detalhe.jpg">

            <h2>Freya</h2>

            <div class="info">
                <p><b>Classe:</b> Lutador</p>
                <p><b>Rota:</b> EXP Lane</p>
            </div>

            <hr style="margin:20px 0; opacity:0.2;">

            <div class="skill">
                <div class="skill-title">🔥 Skill 1 – Salto da Fé</div>
                <p>
                    Freya salta para a área designada e atinge o chão com seu escudo,
                    ganhando 500 <span class="dourado">(+100% do Ataque Físico Total)</span> de escudo
                    e causando 200 <span class="dourado">(+80% do Ataque Físico Adicional)</span>
                    de <span class="vermelho">Dano Físico</span> aos inimigos dentro da área,
                    os lançando ao ar por 0.4s.
                </p>

                <table class="tabela-skill">
                    <tr>
                        <th></th>
                        <th>Nv.1</th>
                        <th>Nv.2</th>
                        <th>Nv.3</th>
                        <th>Nv.4</th>
                        <th>Nv.5</th>
                        <th>Nv.6</th>
                    </tr>
                    <tr>
                        <td><b>Tempo de Recarga</b></td>
                        <td>8.0</td>
                        <td>7.6</td>
                        <td>7.2</td>
                        <td>6.8</td>
                        <td>6.4</td>
                        <td>6.0</td>
                    </tr>
                    <tr>
                        <td><b>Escudo</b></td>
                        <td>500</td>
                        <td>580</td>
                        <td>660</td>
                        <td>740</td>
                        <td>820</td>
                        <td>900</td>
                    </tr>
                    <tr>
                        <td><b>Dano Base</b></td>
                        <td>200</td>
                        <td>220</td>
                        <td>240</td>
                        <td>260</td>
                        <td>280</td>
                        <td class="vermelho">300</td>
                    </tr>
                </table>
            </div>

            <br>
            <button class="classe-btn" onclick="fecharDetalhes()">← Voltar</button>

        </div>
    `;
}

function fecharDetalhes() {
    document.getElementById("detalhes").innerHTML = "";
}

</script>

</body>
</html>
