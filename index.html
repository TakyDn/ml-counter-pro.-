<!DOCTYPE html>
<html>
<head>
<title>ML COUNTER PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(to bottom, #070b1f, #0f1433);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

h1 {
    color: orange;
}

h2 {
    margin-top: 15px;
}

.classe-btn {
    background: linear-gradient(45deg, #ff9900, #ffb84d);
    border: none;
    padding: 12px 22px;
    border-radius: 14px;
    font-weight: bold;
    margin: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.classe-btn:hover {
    transform: scale(1.05);
}

.hero-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
}

.hero-card {
    background: #1b1f3a;
    border-radius: 18px;
    padding: 10px;
    width: 160px;
    cursor: pointer;
    transition: 0.3s;
}

.hero-card:hover {
    transform: scale(1.05);
}

.hero-card img {
    width: 100%;
    border-radius: 14px;
}

.hero-name {
    margin-top: 8px;
    font-weight: bold;
}

/* 🔥 NOVO CARD DE DETALHES */
.detalhes-card {
    margin-top: 40px;
    background: rgba(27, 31, 58, 0.9);
    padding: 25px;
    border-radius: 25px;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: 0 0 25px rgba(255, 165, 0, 0.3);
    animation: aparecer 0.5s ease forwards;
}

.detalhes-card img {
    width: 75%;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(255, 165, 0, 0.4);
}

.info {
    text-align: left;
    margin-top: 20px;
    line-height: 1.6;
}

.info b {
    color: #ffb84d;
}

/* Animação */
@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<h1>ML COUNTER PRO</h1>
<h2>Escolha uma Classe</h2>

<button class="classe-btn" onclick="mostrarLutador()">⚔️ Lutador</button>

<div class="hero-container" id="listaHerois"></div>
<div id="detalhes"></div>

<script>

function mostrarLutador() {
    document.getElementById("listaHerois").innerHTML = `
        <div class="hero-card" onclick="abrirFreya()">
            <img src="freya-card.jpg">
            <div class="hero-name">Freya</div>
        </div>
    `;
}

function abrirFreya() {
    document.getElementById("detalhes").innerHTML = `
        <div class="detalhes-card">
            <img src="freya-detalhe.jpg">
            <h2>Freya</h2>
            <div class="info">
                <p><b>Classe:</b> Lutador</p>
                <p><b>Rota:</b> EXP Lane</p>
                <p><b>Lore:</b> Freya é uma guerreira abençoada pelos deuses, conhecida por sua força e resistência em batalha.</p>
            </div>
            <br>
            <button class="classe-btn" onclick="fecharDetalhes()">← Voltar</button>
        </div>
    `;
}

function fecharDetalhes() {
    document.getElementById("detalhes").innerHTML = "";
}

</script>

</body>
</html>
