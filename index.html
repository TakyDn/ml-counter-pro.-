<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML COUNTER PRO</title>

<style>
body {
    background: linear-gradient(180deg,#0f0f1a,#090912);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
}

.container {
    margin-top: 30px;
}

button {
    background: orange;
    border: none;
    padding: 12px 20px;
    margin: 8px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.herois {
    margin-top: 30px;
}

.card-heroi {
    background: #1c1c2e;
    padding: 20px;
    margin: 15px;
    border-radius: 15px;
    display: inline-block;
    width: 140px;
    cursor: pointer;
    transition: 0.3s;
}

.card-heroi:hover {
    transform: scale(1.05);
}

.card-detalhe {
    background: #1c1c2e;
    padding: 25px;
    margin-top: 30px;
    border-radius: 15px;
}
</style>
</head>

<body>

<h1>ML COUNTER PRO</h1>
<h2>Escolha uma Classe</h2>

<div class="container">
    <button onclick="mostrarClasse('tanque')">🛡️ Tanque</button>
    <button onclick="mostrarClasse('lutador')">⚔️ Lutador</button>
    <button onclick="mostrarClasse('mago')">🧙 Mago</button>
    <button onclick="mostrarClasse('assassino')">🗡️ Assassino</button>
    <button onclick="mostrarClasse('atirador')">🎯 Atirador</button>
    <button onclick="mostrarClasse('suporte')">💚 Suporte</button>
</div>

<div class="herois" id="areaHerois"></div>

<script>

const heroisDetalhes = {
    "Freya": {
        classe: "Lutador",
        rota: "EXP Lane",
        lore: "Freya é uma guerreira abençoada pelos deuses, conhecida por sua força e resistência em batalha."
    }
};

const bancoHerois = {
    tanque: ["Tigreal", "Khufra", "Atlas"],
    lutador: ["Freya", "Aldous", "Leomord"],
    mago: ["Valir", "Lunox", "Kagura"],
    assassino: ["Gusion", "Hayabusa", "Helcurt"],
    atirador: ["Layla", "Beatrix", "Clint"],
    suporte: ["Angela", "Rafaela", "Estes"]
};

function mostrarClasse(classe) {
    const area = document.getElementById("areaHerois");
    area.innerHTML = "";

    bancoHerois[classe].forEach(function(nome) {
        const card = document.createElement("div");
        card.className = "card-heroi";
        card.innerText = nome;
        card.onclick = function() {
            mostrarHeroi(nome);
        };
        area.appendChild(card);
    });
}

function mostrarHeroi(nome) {
    const area = document.getElementById("areaHerois");

    const dados = heroisDetalhes[nome];

    if (!dados) {
        area.innerHTML = `
            <div class="card-detalhe">
                <h2>${nome}</h2>
                <p>Informações ainda não adicionadas.</p>
                <br>
                <button onclick="voltar()">⬅ Voltar</button>
            </div>
        `;
        return;
    }

    area.innerHTML = `
        <div class="card-detalhe">
            <h2>${nome}</h2>
            <p><strong>Classe:</strong> ${dados.classe}</p>
            <p><strong>Rota:</strong> ${dados.rota}</p>
            <p><strong>Lore:</strong> ${dados.lore}</p>
            <br>
            <button onclick="voltar()">⬅ Voltar</button>
        </div>
    `;
}

function voltar() {
    document.getElementById("areaHerois").innerHTML = "";
}

</script>

</body>
</html>
