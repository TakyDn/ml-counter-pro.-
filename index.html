<!DOCTYPE html>
<html>
<head>
<title>ML COUNTER PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(to bottom, #070b1f, #0f1433);
    color: white;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    color: orange;
}

.classe-btn {
    background: orange;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: bold;
    margin: 6px;
    cursor: pointer;
}

.hero-container {
    margin-top: 30px;
    display: flex;
    justify-content: center;
}

.hero-card {
    background: #1b1f3a;
    border-radius: 18px;
    padding: 10px;
    width: 140px;
    cursor: pointer;
    transition: 0.3s;
}

.hero-card:hover {
    transform: scale(1.05);
}

.hero-card img {
    width: 100%;
    border-radius: 14px;
}

.hero-name {
    margin-top: 8px;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>ML COUNTER PRO</h1>
<h2>Escolha uma Classe</h2>

<button class="classe-btn" onclick="mostrarLutador()">⚔️ Lutador</button>

<div class="hero-container" id="listaHerois"></div>

<script>

function mostrarLutador() {
    document.getElementById("listaHerois").innerHTML = `
        <div class="hero-card">
            <img src="freya-card.jpg">
            <div class="hero-name">Freya</div>
        </div>
    `;
}

</script>

</body>
</html>
