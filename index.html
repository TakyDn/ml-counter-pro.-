<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ML COUNTER PRO</title>

<!-- CSS PRINCIPAIS -->
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/bloqueio-visual.css">
<link rel="stylesheet" href="css/botoes.css">
<link rel="stylesheet" href="css/herois-cards.css">
<link rel="stylesheet" href="css/herois-detalhes.css">
<link rel="stylesheet" href="css/logo.css">
<link rel="stylesheet" href="css/menu-lateral.css">
<link rel="stylesheet" href="css/nox.css">
<link rel="stylesheet" href="css/ocultar.css">

</head>

<body>

<!-- ================================= -->
<!-- BLOQUEIO DE ORIENTAÇÃO -->
<!-- ================================= -->

<div id="bloqueio-orientacao">

<div class="orientacao-container">

<img src="img-nox/nox-orientacao.png" class="nox-orientacao" alt="NOX orientação">

<h2>Campo de visão comprometido.</h2>

<p>
Vire o dispositivo.<br>
Vitórias exigem perspectiva.
</p>

<div class="icone-rotacao"></div>

</div>

</div>


<!-- ================================= -->
<!-- BOTÃO MENU -->
<!-- ================================= -->

<div class="menu-btn" onclick="abrirMenu()">☰</div>


<!-- ================================= -->
<!-- MENU LATERAL -->
<!-- ================================= -->

<div class="menu-lateral" id="menuLateral">

<div class="menu-fechar" onclick="fecharMenu()">✖</div>

<a href="#" onclick="irInicio()">INÍCIO</a>
<a href="#">NOVIDADES</a>
<a href="#" onclick="abrirHerois()">HERÓIS</a>
<a href="#">HERÓIS COUNTERS</a>
<a href="#">EQUIPAMENTOS</a>
<a href="#">SUPORTE</a>

</div>

<div class="overlay" id="overlay" onclick="fecharMenu()"></div>


<!-- ================================= -->
<!-- LOGO FIXA-->
<!-- ================================= -->

<div class="logo-container-top" id="logoTopo">
<img src="logo.png" class="logo-top" onclick="tocarSomLogo()" alt="Logo ML Counter Pro">
</div>


<!-- ================================= -->
<!-- CONTAINER PRINCIPAL -->
<!-- ================================= -->

<div class="container">


<!-- ================================= -->
<!-- TELA INICIAL -->
<!-- ================================= -->

<div id="telaInicial"></div>


<!-- ================================= -->
<!-- TELA HERÓIS -->
<!-- ================================= -->

<div id="telaHerois" class="oculto">

<h2 id="tituloClasses">SELECIONE UMA CLASSE</h2>

<div id="areaCards">

<!-- CLASSES -->

<div class="classe-card" onclick="abrirClasse('fighter')">
<img src="img-classes/fighter.png" class="classe-icon" alt="Classe Lutador">
<h3>LUTADOR</h3>
</div>

<div class="classe-card" onclick="abrirClasse('tank')">
<img src="img-classes/tank.png" class="classe-icon" alt="Classe Tank">
<h3>TANK</h3>
</div>

<div class="classe-card" onclick="abrirClasse('assassin')">
<img src="img-classes/assassin.png" class="classe-icon" alt="Classe Assassino">
<h3>ASSASSINO</h3>
</div>

<div class="classe-card" onclick="abrirClasse('mage')">
<img src="img-classes/mage.png" class="classe-icon" alt="Classe Mago">
<h3>MAGO</h3>
</div>

<div class="classe-card" onclick="abrirClasse('marksman')">
<img src="img-classes/marksman.png" class="classe-icon" alt="Classe Atirador">
<h3>ATIRADOR</h3>
</div>

<div class="classe-card" onclick="abrirClasse('support')">
<img src="img-classes/support.png" class="classe-icon" alt="Classe Suporte">
<h3>SUPORTE</h3>
</div>

</div>

</div>


<!-- ================================= -->
<!-- TELA FIGHTERS -->
<!-- ================================= -->

<div id="telaFighters" class="oculto">

<!-- TOPO -->

<div class="topo-fighters">

<button class="btn-voltar" onclick="voltarClasses()">←</button>

<h2 class="titulo-fighters">LUTADORES</h2>

<div class="busca-heroi">

<input 
type="text" 
id="pesquisaHeroi"
placeholder="Pesquisar herói...">

</div>

</div>


<!-- GRID HEROIS -->

<div class="grid-herois">

<div class="heroi-card">
<img src="img-herois/phoveus.png" alt="Phoveus">
<span class="nome-heroi">Phoveus</span>
</div>

<div class="heroi-card">
<img src="img-herois/badang.png" alt="Badang">
<span class="nome-heroi">Badang</span>
</div>

<div class="heroi-card">
<img src="img-herois/khaleed.png" alt="Khaleed">
<span class="nome-heroi">Khaleed</span>
</div>

<div class="heroi-card">
<img src="img-herois/grock.png" alt="Grock">
<span class="nome-heroi">Grock</span>
</div>

<div class="heroi-card">
<img src="img-herois/roger.png" alt="Roger">
<span class="nome-heroi">Roger</span>
</div>

<div class="heroi-card">
<img src="img-herois/aldous.png" alt="Aldous">
<span class="nome-heroi">Aldous</span>
</div>

</div>

</div>


<!-- ================================= -->
<!-- NOX ASSISTENTE -->
<!-- ================================= -->

<div class="nox-container" id="noxContainer">

<img src="img-nox/nox-duvida.png" class="nox-img" alt="NOX assistente">

<div class="nox-box" id="noxFala"></div>

</div>


<!-- SCRIPT -->

<script src="js/menu.js"></script>
<script src="js/navegacao.js"></script>
<script src="js/nox.js"></script>
<script src="js/herois.js"></script>
<script src="js/script.js"></script>

</body>
  </html>
