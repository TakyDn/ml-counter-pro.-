<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML COUNTER PRO</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/bloqueio-visual.css">
<link rel="stylesheet" href="css/menu-lateral.css">
<link rel="stylesheet" href="css/nox.css">
<link rel="stylesheet" href="css/botoes.css">
<link rel="stylesheet" href="css/herois-cards.css">
<link rel="stylesheet" href="css/herois-detalhes.css">
<link rel="stylesheet" href="css/logo.css">
<link rel="stylesheet" href="css/ocultar.css">

</head>

<body>

<!-- BOTÃO MENU -->
<div class="menu-btn" onclick="abrirMenu()">☰</div>

<!-- MENU LATERAL -->
<div class="menu-lateral" id="menu">
<a onclick="mostrarTela('telaHerois')">Heróis</a>
<a onclick="mostrarTela('telaItens')">Itens</a>
<a onclick="mostrarTela('telaCounters')">Counters</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="fecharMenu()"></div>


<!-- TELA INICIAL -->
<section id="telaInicial" class="ativo">

<div class="logo-container">
<img src="img/logo.png" class="logo-img">
</div>

<h2>Bem vindo ao ML Counter Pro</h2>

<button class="btn-classe" onclick="mostrarTela('telaHerois')">
Ver Heróis
</button>

</section>


<!-- TELA HEROIS -->
<section id="telaHerois" class="oculto">

<h2>Heróis</h2>

<div class="areaCards">

<div class="card" onclick="abrirHeroi('freya')">
<img src="img/heroes/freya.jpg">
<h3>Freya</h3>
</div>

</div>

<button class="botao" onclick="voltarInicio()">Voltar</button>

</section>


<!-- TELA DETALHE HEROI -->
<section id="telaDetalhe" class="oculto">

<h2>Freya</h2>

<img src="img/heroes/freya.jpg" class="hero-img">

<p>
<span class="info-destaque">Função:</span> Lutadora
</p>

<p>
<span class="info-destaque">Dificuldade:</span> Média
</p>

<div class="skill-box">

<h3>Skill 1</h3>
<p>Salta em direção ao inimigo causando dano.</p>

<h3>Skill 2</h3>
<p>Ataques consecutivos com escudo divino.</p>

<h3>Ultimate</h3>
<p>Ganha escudo e aumenta velocidade de ataque.</p>

</div>

<button class="botao" onclick="mostrarTela('telaHerois')">
Voltar
</button>

</section>


<!-- NOX -->
<div id="nox-container">

<img src="img/nox.png" class="nox-img">

<div class="nox-caixa" id="noxTexto">
</div>

</div>


<script>

function abrirMenu(){
document.getElementById("menu").classList.add("ativo")
document.getElementById("overlay").classList.add("ativo")
}

function fecharMenu(){
document.getElementById("menu").classList.remove("ativo")
document.getElementById("overlay").classList.remove("ativo")
}

function mostrarTela(tela){

let telas = document.querySelectorAll("section")

telas.forEach(t=>{
t.classList.remove("ativo")
t.classList.add("oculto")
})

document.getElementById(tela).classList.remove("oculto")
document.getElementById(tela).classList.add("ativo")

}

function voltarInicio(){
mostrarTela("telaInicial")
}

function abrirHeroi(nome){
mostrarTela("telaDetalhe")
ativarNox("Analisando matchup... Freya possui grande pressão no early game.")
}

function ativarNox(texto){

let caixa = document.getElementById("noxTexto")

caixa.innerHTML=""

let i=0

function digitar(){
if(i < texto.length){
caixa.innerHTML += texto.charAt(i)
i++
setTimeout(digitar,25)
}
}

digitar()

}

</script>

</body>
</html>
