<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML COUNTER PRO</title>

<style>
body {
    background: linear-gradient(180deg, #0f0f1a, #090912);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 20px;
}

h1 {
    color: orange;
}

.container {
    margin-top: 30px;
}

button {
    background: orange;
    border: none;
    padding: 12px 20px;
    margin: 8px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.card-detalhe {
    background: #1c1c2e;
    padding: 25px;
    margin-top: 30px;
    border-radius: 15px;
}

.hero-img {
    width: 100%;
    max-width: 300px;
    border-radius: 15px;
    margin: 15px 0;
    box-shadow: 0 0 20px rgba(255,165,0,0.6);
}
</style>
</head>

<body>

<h1>ML COUNTER PRO</h1>
<h2>Escolha uma Classe</h2>

<div class="container">
    <button>🛡️ Tanque</button>
    <button>⚔️ Lutador</button>
    <button>🧙 Mago</button>
    <button>🗡️ Assassino</button>
    <button>🎯 Atirador</button>
    <button>💚 Suporte</button>
</div>

<div class="card-detalhe">
    <h2>Freya</h2>

    <!-- IMAGEM ADICIONADA AQUI -->
    <img src="freya.jpg" alt="Freya MLBB" class="hero-img">

    <p><strong>Classe:</strong> Lutador</p>
    <p><strong>Rota:</strong> EXP Lane</p>
    <p><strong>Lore:</strong> Freya é uma guerreira abençoada pelos deuses, conhecida por sua força e resistência em batalha.</p>

    <button onclick="location.reload()">← Voltar</button>
</div>

</body>
</html>
